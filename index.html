<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISUAL ARCHIVE | Pure Black</title>
    
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #000000;
            --accent: #c8f04d;
            --text-main: #ffffff;
            --text-dim: #444;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html { scroll-behavior: auto; background: var(--bg); }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: "Inter", sans-serif;
            background-image: radial-gradient(#111 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px; }

        /* ── BUTTON STYLING ── */
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            padding: 8px 16px;
            border: 1px solid #222;
            transition: all 0.2s ease;
            background: #050505;
        }

        .nav-link svg { width: 14px; height: 14px; fill: currentColor; transition: transform 0.2s ease; }
        .nav-link:hover { border-color: var(--accent); color: var(--accent); }
        .nav-link:hover svg { transform: translateX(-3px); }

        .header { margin: 60px 0 80px; }
        .header h1 { font-size: clamp(3rem, 12vw, 8rem); font-weight: 800; letter-spacing: -0.06em; line-height: 0.8; }

        .section-label {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--accent);
            letter-spacing: 0.4em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .section-label::after { content: ""; height: 1px; flex-grow: 1; background: #111; }

        /* ── GALLERY ── */
        .gallery-grid { 
            display: grid; 
            gap: 20px; 
            margin-bottom: 100px; 
            grid-template-columns: repeat(6, 1fr);
        }

        .art-card {
            background: #050505;
            position: relative;
            overflow: hidden;
            contain: paint layout;
            border: 1px solid #111;
        }

        .wide { grid-column: span 3; aspect-ratio: 16/9; }
        .tall { grid-column: span 2; aspect-ratio: 1/1.4; }

        .art-card img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: opacity, transform;
        }

        .img-loaded { opacity: 0.6 !important; }
        .art-card:hover img { opacity: 1 !important; transform: scale(1.04); }

        .footer { 
            padding: 100px 0; 
            border-top: 1px solid #111; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 20px;
        }

        @media (max-width: 900px) {
            .wide, .tall { grid-column: span 6; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <nav class="nav-bar">
            <a href="http://rajin.work.gd" class="nav-link">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                HOME
            </a>
        </nav>

        <header class="header">
            <h1>ARCHIVE.</h1>
        </header>

        <span class="section-label">01 // LANDSCAPES</span>
        <main class="gallery-grid">
            <div class="art-card wide"><img src="land1.png" loading="lazy" decoding="async" onload="this.classList.add('img-loaded')"></div>
            <div class="art-card wide"><img src="land2.png" loading="lazy" decoding="async" onload="this.classList.add('img-loaded')"></div>
            <div class="art-card wide"><img src="land3.png" loading="lazy" decoding="async" onload="this.classList.add('img-loaded')"></div>
            <div class="art-card wide"><img src="form.png" loading="lazy" decoding="async" onload="this.classList.add('img-loaded')"></div>
        </main>

        <span class="section-label">02 // PORTRAITS</span>
        <section class="gallery-grid">
            <div class="art-card tall"><img src="port1.png" loading="lazy" decoding="async" onload="this.classList.add('img-loaded')"></div>
            <div class="art-card tall"><img src="port2.png" loading="lazy" decoding="async" onload="this.classList.add('img-loaded')"></div>
            <div class="art-card tall"><img src="port3.png" loading="lazy" decoding="async" onload="this.classList.add('img-loaded')"></div>
        </section>

        <footer class="footer">
            <a href="http://rajin.work.gd" class="nav-link">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                BACK TO HOME
            </a>
            <p style="font-family: var(--font-mono); font-size: 0.5rem; color: var(--text-dim); letter-spacing: 3px;">END_OF_FILE</p>
        </footer>
    </div>

</body>
</html>
